theater_devices_off:
  sequence:
    - action: google_assistant_sdk.send_text_command
      metadata: {}
      data:
        command: turn off the ping pong lights
      alias: Ping pong off
    - action: remote.send_command
      metadata: {}
      target:
        entity_id: remote.basement_ir_blaster
      data:
        num_repeats: 1
        delay_secs: 0.4
        hold_secs: 0
        device: projector
        command: power
      alias: projector power 1
    - delay:
        hours: 0
        minutes: 0
        seconds: 1
        milliseconds: 0
    - action: remote.send_command
      metadata: {}
      target:
        entity_id: remote.basement_ir_blaster
      data:
        num_repeats: 1
        delay_secs: 0.4
        hold_secs: 0
        device: projector
        command: power
      alias: projector power 2
    - delay:
        hours: 0
        minutes: 0
        seconds: 1
        milliseconds: 0
    - action: remote.send_command
      metadata: {}
      target:
        entity_id: remote.basement_ir_blaster
      data:
        num_repeats: 1
        delay_secs: 0.4
        hold_secs: 0
        device: audio
        command: power
      alias: audio power
  alias: Theater devices off
  description: ""
